<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .kpi {
            display: flex;
            gap: 20px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }
        canvas {
            margin-top: 40px;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>📊 Analytics Dashboard</h1>

<div class="kpi">
    <div class="card">
        <h3>Total Revenue</h3>
        <p id="rev"></p>
    </div>
    <div class="card">
        <h3>Total Students</h3>
        <p id="students"></p>
    </div>
</div>

<canvas id="chart"></canvas>

<script>
{{DATA_PLACEHOLDER}}

const totalRevenue = DATA.webinar.reduce((a,b)=>a+b.revenue,0);
const totalStudents = DATA.attendee.summary.students || 0;

document.getElementById("rev").innerText = totalRevenue;
document.getElementById("students").innerText = totalStudents;

const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: DATA.webinar.map(x => x.trainer),
        datasets: [{
            label: 'Revenue',
            data: DATA.webinar.map(x => x.revenue)
        }]
    }
});
</script>

</body>
</html>
